<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Himalayan Suite Hotel — Dashboard</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="HMS Dashboard"/>
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>
  <meta name="theme-color" content="#1a3c5e"/>
  <style>
    :root {
      --primary:  #1a3c5e;
      --accent:   #e8a020;
      --green:    #27ae60;
      --red:      #e74c3c;
      --purple:   #7b5ea7;
      --bg:       #f0f4f8;
      --card:     #ffffff;
      --text:     #2c3e50;
      --muted:    #7f8c8d;
      --border:   #e0e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--primary), #2c5f8a);
      color: white; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .3px; }
    .header-left h1 span { color: var(--accent); }
    .header-left .subtitle { font-size: .75rem; opacity: .75; margin-top: 2px; }
    .logout-btn {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: white; padding: 7px 14px; border-radius: 20px;
      font-size: .8rem; cursor: pointer; transition: .2s; text-decoration: none;
    }
    .logout-btn:hover { background: rgba(255,255,255,.25); }

    /* ── Date Bar ── */
    .date-bar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center;
      justify-content: center; gap: 10px; flex-wrap: wrap;
    }
    .date-nav-btn {
      background: var(--primary); color: white; border: none;
      width: 34px; height: 34px; border-radius: 50%;
      font-size: 1rem; cursor: pointer; transition: .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .date-nav-btn:hover { background: #2c5f8a; }
    .date-nav-btn:disabled { opacity: .4; cursor: not-allowed; }
    #date-display {
      font-weight: 600; font-size: .9rem; color: var(--primary);
      min-width: 180px; text-align: center;
    }
    #date-picker {
      padding: 7px 12px; border-radius: 8px;
      border: 1.5px solid var(--border); font-size: .85rem;
      color: var(--text); cursor: pointer; outline: none;
    }
    #date-picker:focus { border-color: var(--primary); }
    .today-btn {
      background: var(--green); color: white; border: none;
      padding: 7px 16px; border-radius: 20px;
      font-size: .82rem; font-weight: 600; cursor: pointer; transition: .2s;
    }
    .today-btn:hover { background: #219a52; }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 0 20px;
    }
    .tab-btn {
      padding: 14px 24px; font-size: .9rem; font-weight: 600;
      color: var(--muted); border: none; background: none;
      cursor: pointer; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: .2s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Main Content ── */
    main { padding: 20px; max-width: 860px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Loading / Error ── */
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 50vh; flex-direction: column; gap: 16px; color: var(--muted);
    }
    .spinner {
      width: 44px; height: 44px; border: 4px solid #ddd;
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg {
      display: none; background: #fdf0ee; border: 1px solid var(--red);
      border-radius: 10px; padding: 14px 18px; color: var(--red);
      margin-bottom: 16px; font-size: .88rem;
    }

    /* ── Section Title ── */
    .section-title {
      font-size: .78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin: 20px 0 10px;
    }

    /* ── Stat Cards ── */
    .cards-grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(2, 1fr);
    }
    .stat-card {
      background: var(--card); border-radius: 14px;
      padding: 16px 18px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
      border-top: 4px solid var(--primary);
    }
    .stat-card.green  { border-top-color: var(--green); }
    .stat-card.orange { border-top-color: var(--accent); }
    .stat-card.purple { border-top-color: var(--purple); }
    .stat-card.blue   { border-top-color: #2980b9; }
    .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--text); line-height: 1.1; margin: 6px 0 4px; }
    .stat-sub   { font-size: .78rem; color: var(--muted); }
    .occ-bar-wrap { background: #e8f0f8; border-radius: 6px; height: 6px; margin-top: 10px; overflow: hidden; }
    .occ-bar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--primary), #2c7abf); }
    .occ-bar.green  { background: linear-gradient(90deg, var(--green), #2ecc71); }
    .occ-bar.orange { background: linear-gradient(90deg, var(--accent), #f39c12); }
    .occ-bar.purple { background: linear-gradient(90deg, var(--purple), #a07cc5); }

    /* ── Revenue Table ── */
    .table-card {
      background: var(--card); border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th {
      background: var(--primary); color: white;
      padding: 12px 16px; text-align: left;
      font-size: .75rem; text-transform: uppercase; letter-spacing: .5px;
    }
    th.right, td.right { text-align: right; }
    td { padding: 11px 16px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; font-weight: 700; background: #f7f9fc; }
    tr:hover:not(:last-child) td { background: #f5f8ff; }
    tr.subtotal td {
      background: #eef4fb; font-weight: 600; font-style: italic;
      color: var(--primary); border-top: 1px solid #c8d8eb;
      border-bottom: 1px solid #c8d8eb;
    }
    .badge-up   { background: #eafaf1; color: var(--green); padding: 3px 8px; border-radius: 20px; font-size: .76rem; font-weight: 600; }
    .badge-down { background: #fdf0ee; color: var(--red);   padding: 3px 8px; border-radius: 20px; font-size: .76rem; font-weight: 600; }

    /* ── Guest list ── */
    .guest-summary {
      display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .guest-chip {
      background: var(--card); border-radius: 10px;
      padding: 10px 18px; font-size: .85rem; font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      display: flex; align-items: center; gap: 8px; color: var(--text);
    }
    .guest-chip span { font-size: 1.1rem; }
    .plan-badge {
      display: inline-block; padding: 2px 9px; border-radius: 12px;
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .3px;
    }
    .plan-bb { background: #dbeafe; color: #1e40af; }
    .plan-hb { background: #fef3c7; color: #92400e; }
    .plan-fb { background: #d1fae5; color: #065f46; }
    .plan-ro { background: #f3f4f6; color: #374151; }
    .plan-other { background: #ede9fe; color: #5b21b6; }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: .76rem; font-weight: 700; white-space: nowrap;
    }
    .status-today    { background: #fee2e2; color: #991b1b; }
    .status-tomorrow { background: #fef3c7; color: #92400e; }
    .status-staying  { background: #d1fae5; color: #065f46; }
    .no-guests {
      text-align: center; padding: 48px 20px;
      color: var(--muted); font-size: .9rem;
    }
    .no-guests .no-icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Footer ── */
    .footer { text-align: center; color: var(--muted); font-size: .74rem; margin: 24px 0 12px; }

    /* ── Date display (two-line) ── */
    #date-display { text-align: center; min-width: 180px; }
    #date-en { font-weight: 600; font-size: .9rem; color: var(--primary); }
    #date-np { font-size: .75rem; color: var(--muted); margin-top: 2px; font-weight: 500; }

    /* ── BS Date picker button ── */
    .bs-picker-wrap { position: relative; }
    .bs-btn {
      background: var(--accent); color: white; border: none;
      padding: 7px 14px; border-radius: 20px;
      font-size: .82rem; font-weight: 600; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    .bs-btn:hover { background: #d4921c; }

    /* ── BS popup ── */
    .bs-popup {
      display: none; position: absolute;
      top: calc(100% + 10px); left: 50%; transform: translateX(-50%);
      background: white; border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      border: 1px solid var(--border);
      padding: 18px 16px; z-index: 999; min-width: 270px;
    }
    .bs-popup.open { display: block; }
    .bs-popup-title {
      font-weight: 700; font-size: .82rem; color: var(--primary);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 12px;
    }
    .bs-popup-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .bs-select {
      flex: 1; padding: 8px 6px; border-radius: 8px;
      border: 1.5px solid var(--border); font-size: .82rem;
      color: var(--text); outline: none; cursor: pointer;
      background: #f8fafc;
    }
    .bs-select:focus { border-color: var(--primary); background: white; }
    .bs-go-btn {
      width: 100%; padding: 10px; background: var(--primary);
      color: white; border: none; border-radius: 8px;
      font-size: .9rem; font-weight: 600; cursor: pointer; transition: .2s;
    }
    .bs-go-btn:hover { background: #2c5f8a; }
    .bs-error { color: var(--red); font-size: .78rem; margin-top: 8px; min-height: 16px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .header-left h1 { font-size: 1rem; }
      .tab-btn { padding: 12px 16px; font-size: .82rem; }
      .stat-value { font-size: 1.6rem; }
      th, td { padding: 9px 10px; }
      table { font-size: .8rem; }
      #date-display { min-width: 140px; }
      #date-en { font-size: .82rem; }
      .bs-popup { left: auto; right: 0; transform: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🏨 <span>Himalayan Suite</span> Hotel</h1>
    <div class="subtitle">Live Hotel Dashboard</div>
  </div>
  <a href="/logout" class="logout-btn">Sign Out</a>
</header>

<div class="date-bar">
  <button class="date-nav-btn" id="prev-btn" onclick="goDate(-1)" title="Previous day">&#8592;</button>
  <div id="date-display">
    <div id="date-en">Loading…</div>
    <div id="date-np"></div>
  </div>
  <button class="date-nav-btn" id="next-btn" onclick="goDate(1)" title="Next day">&#8594;</button>
  <input type="date" id="date-picker" onchange="loadByDate()"/>

  <!-- Nepali BS date picker -->
  <div class="bs-picker-wrap">
    <button class="bs-btn" id="bs-picker-btn" onclick="toggleBsPicker(event)">🗓 BS</button>
    <div class="bs-popup" id="bs-popup">
      <div class="bs-popup-title">🗓 Nepali Date (BS)</div>
      <div class="bs-popup-row">
        <select id="bs-year" class="bs-select" title="Year"></select>
        <select id="bs-month" class="bs-select" title="Month"></select>
        <select id="bs-day" class="bs-select" title="Day"></select>
      </div>
      <button class="bs-go-btn" onclick="goBsDate()">Go →</button>
      <div id="bs-error" class="bs-error"></div>
    </div>
  </div>

  <button class="today-btn" onclick="goToday()">Today</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('occupancy', this)">📊 Occupancy</button>
  <button class="tab-btn" onclick="switchTab('revenue', this)">💰 Revenue</button>
  <button class="tab-btn" onclick="switchTab('guests', this)">👥 In-House <span id="guest-count-badge"></span></button>
</div>

<div id="error-msg"></div>
<div id="loading"><div class="spinner"></div><div>Fetching hotel data…</div></div>

<main id="main-content" style="display:none">

  <!-- Occupancy Tab -->
  <div class="tab-content active" id="tab-occupancy">
    <div class="section-title" id="occ-label-today">Today</div>
    <div class="cards-grid">
      <div class="stat-card green">
        <div class="stat-label" id="lbl-today">Today</div>
        <div class="stat-value" id="occ-today-pct">—</div>
        <div class="stat-sub" id="occ-today-sub">—</div>
        <div class="occ-bar-wrap"><div class="occ-bar green" id="bar-today"></div></div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label" id="lbl-yest">Yesterday</div>
        <div class="stat-value" id="occ-yest-pct">—</div>
        <div class="stat-sub" id="occ-yest-sub">—</div>
        <div class="occ-bar-wrap"><div class="occ-bar" id="bar-yest"></div></div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label" id="lbl-mtd">This Month</div>
        <div class="stat-value" id="occ-mtd-pct">—</div>
        <div class="stat-sub" id="occ-mtd-sub">—</div>
        <div class="occ-bar-wrap"><div class="occ-bar orange" id="bar-mtd"></div></div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label" id="lbl-fy">Fiscal Year</div>
        <div class="stat-value" id="occ-fy-pct">—</div>
        <div class="stat-sub" id="occ-fy-sub">—</div>
        <div class="occ-bar-wrap"><div class="occ-bar purple" id="bar-fy"></div></div>
      </div>
    </div>
    <div class="footer" id="occ-updated"></div>
  </div>

  <!-- Revenue Tab -->
  <div class="tab-content" id="tab-revenue">
    <div class="section-title" id="rev-section-label">Revenue</div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Category</th>
            <th class="right" id="rev-col-today">Today</th>
            <th class="right" id="rev-col-yest">Yesterday</th>
            <th class="right">Change</th>
          </tr>
        </thead>
        <tbody id="revenue-body"></tbody>
      </table>
    </div>
    <div class="footer" id="rev-updated"></div>
  </div>

  <!-- In-House Guests Tab -->
  <div class="tab-content" id="tab-guests">
    <div class="guest-summary" id="guest-summary"></div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Room</th>
            <th>Guest Name</th>
            <th>Plan</th>
            <th class="right">Arrival</th>
            <th class="right">Departure</th>
            <th class="right">Nights</th>
            <th class="right">Status</th>
          </tr>
        </thead>
        <tbody id="guest-body"></tbody>
      </table>
    </div>
    <div class="footer" id="guest-updated"></div>
  </div>

</main>

<script>
let currentDate = null;

// ── Tab switching ──────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Date helpers ───────────────────────────────────────
function getToday() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addDays(dateStr, delta) {
  const parts = dateStr.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  d.setDate(d.getDate() + delta);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ── BS Date Picker ─────────────────────────────────────
const BS_MONTHS = [
  'Baisakh','Jestha','Ashadh','Shrawan',
  'Bhadra','Ashwin','Kartik','Mangsir',
  'Poush','Magh','Falgun','Chaitra'
];

function initBsPicker() {
  const ysel = document.getElementById('bs-year');
  const msel = document.getElementById('bs-month');
  const dsel = document.getElementById('bs-day');

  // Years: 2070 → 2090
  for (let y = 2090; y >= 2070; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    ysel.appendChild(o);
  }
  // Months
  BS_MONTHS.forEach((name, i) => {
    const o = document.createElement('option');
    o.value = i + 1; o.textContent = `${i+1} – ${name}`;
    msel.appendChild(o);
  });
  // Days 1–32
  for (let day = 1; day <= 32; day++) {
    const o = document.createElement('option');
    o.value = day; o.textContent = day;
    dsel.appendChild(o);
  }
}

function syncBsPicker(bs) {
  // Set picker dropdowns to match current viewed date
  document.getElementById('bs-year').value  = bs.year;
  document.getElementById('bs-month').value = bs.month;
  document.getElementById('bs-day').value   = bs.day;
}

function toggleBsPicker(e) {
  e.stopPropagation();
  document.getElementById('bs-popup').classList.toggle('open');
  document.getElementById('bs-error').textContent = '';
}

async function goBsDate() {
  const y   = document.getElementById('bs-year').value;
  const m   = document.getElementById('bs-month').value;
  const day = document.getElementById('bs-day').value;
  const errEl = document.getElementById('bs-error');
  errEl.textContent = '';

  try {
    const res  = await fetch(`/api/bs-to-ad?y=${y}&m=${m}&d=${day}`);
    const data = await res.json();
    if (data.error) { errEl.textContent = '⚠ ' + data.error; return; }

    document.getElementById('bs-popup').classList.remove('open');
    const picker = document.getElementById('date-picker');
    picker.value = data.ad;
    currentDate  = data.ad === getToday() ? null : data.ad;
    loadData(currentDate);
  } catch(e) {
    errEl.textContent = '⚠ ' + e.message;
  }
}

// Close BS popup when clicking outside
document.addEventListener('click', () => {
  document.getElementById('bs-popup').classList.remove('open');
});
document.getElementById('bs-popup').addEventListener('click', e => e.stopPropagation());

// ── Init on load ───────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initBsPicker();
  const picker = document.getElementById('date-picker');
  picker.max   = getToday();
  picker.value = getToday();
  loadData();
});

function goDate(delta) {
  const picker = document.getElementById('date-picker');
  const str = addDays(picker.value, delta);
  if (str > getToday()) return;
  picker.value = str;
  currentDate = str === getToday() ? null : str;
  loadData(currentDate);
}

function loadByDate() {
  const val = document.getElementById('date-picker').value;
  currentDate = val === getToday() ? null : val;
  loadData(currentDate);
}

function goToday() {
  currentDate = null;
  document.getElementById('date-picker').value = getToday();
  loadData();
}

// ── Data loading ───────────────────────────────────────
async function loadData(dateStr) {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  const url = dateStr ? `/api/dashboard?date=${dateStr}` : '/api/dashboard';
  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderDashboard(data);
  } catch(e) {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent = '⚠️ ' + e.message;
    document.getElementById('loading').style.display = 'none';
  }
}

// ── Formatting ─────────────────────────────────────────
function fmt(n, dec=0) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function badge(val) {
  if (val > 0) return `<span class="badge-up">▲ ${fmt(val)}</span>`;
  if (val < 0) return `<span class="badge-down">▼ ${fmt(Math.abs(val))}</span>`;
  return `<span style="color:#bbb">—</span>`;
}

// ── Render ─────────────────────────────────────────────
function renderDashboard(d) {
  const isToday  = d.is_today;
  const labelSel = isToday ? 'Today'     : d.today_str;
  const labelPrv = isToday ? 'Yesterday' : d.prev_str;
  const o = d.occupancy, r = d.rooms;

  // Date bar — English + Nepali date, sync BS picker
  document.getElementById('date-en').textContent = d.date;
  document.getElementById('date-np').textContent = d.nepali_date || '';
  if (d.bs) syncBsPicker(d.bs);
  const picker = document.getElementById('date-picker');
  document.getElementById('next-btn').disabled = picker.value >= getToday();

  // ── Occupancy tab ──
  document.getElementById('lbl-today').textContent = labelSel;
  document.getElementById('lbl-yest').textContent  = labelPrv;

  document.getElementById('occ-today-pct').textContent = o.today_pct + '%';
  document.getElementById('occ-today-sub').textContent  = `${o.today} / ${r.total} rooms · ${fmt(o.today_pax)} pax`;
  document.getElementById('bar-today').style.width = o.today_pct + '%';

  document.getElementById('occ-yest-pct').textContent = o.yest_pct + '%';
  document.getElementById('occ-yest-sub').textContent  = `${o.yesterday} / ${r.total} rooms · ${fmt(o.yest_pax)} pax`;
  document.getElementById('bar-yest').style.width = o.yest_pct + '%';

  document.getElementById('lbl-mtd').textContent     = o.mtd_label;
  document.getElementById('occ-mtd-pct').textContent = o.mtd_pct + '%';
  document.getElementById('occ-mtd-sub').textContent = `${fmt(o.mtd_rooms)} / ${fmt(o.mtd_avail)} room-nights`;
  document.getElementById('bar-mtd').style.width     = Math.min(o.mtd_pct, 100) + '%';

  document.getElementById('lbl-fy').textContent      = o.fy_label;
  document.getElementById('occ-fy-pct').textContent  = o.fy_pct + '%';
  document.getElementById('occ-fy-sub').textContent  = `${fmt(o.fy_rooms)} / ${fmt(o.fy_avail)} room-nights`;
  document.getElementById('bar-fy').style.width      = Math.min(o.fy_pct, 100) + '%';

  const updTime = new Date().toLocaleTimeString();
  const updNote = isToday ? `Last updated: ${updTime} — auto-refreshes every 5 min` : `Historical view · ${d.date}`;
  document.getElementById('occ-updated').textContent = updNote;

  // ── Revenue tab ──
  document.getElementById('rev-section-label').textContent = `Revenue — ${labelSel} vs ${labelPrv}`;
  document.getElementById('rev-col-today').textContent = labelSel;
  document.getElementById('rev-col-yest').textContent  = labelPrv;

  let rows = '';
  for (const row of d.revenue) {
    const cls = row.subtotal ? ' class="subtotal"' : '';
    rows += `<tr${cls}>
      <td>${row.label}</td>
      <td class="right">NPR ${fmt(row.today, 2)}</td>
      <td class="right">NPR ${fmt(row.yesterday, 2)}</td>
      <td class="right">${badge(row.change)}</td>
    </tr>`;
  }
  document.getElementById('revenue-body').innerHTML = rows;
  document.getElementById('rev-updated').textContent = updNote;

  // ── Guests tab ──
  renderGuests(d.guests);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
}

// ── Render Guests ──────────────────────────────────────
function planBadge(plan) {
  const p = (plan || '').toUpperCase();
  if (p.includes('BB') || p.includes('B&B') || p.includes('BF'))
    return `<span class="plan-badge plan-bb">BB</span>`;
  if (p.includes('HB') || p.includes('HALF'))
    return `<span class="plan-badge plan-hb">HB</span>`;
  if (p.includes('FB') || p.includes('FULL') || p.includes('AP'))
    return `<span class="plan-badge plan-fb">FB</span>`;
  if (p.includes('RO') || p.includes('EP') || p === '')
    return `<span class="plan-badge plan-ro">RO</span>`;
  return `<span class="plan-badge plan-other">${plan}</span>`;
}

function statusBadge(remaining) {
  if (remaining === null || remaining === undefined)
    return '—';
  if (remaining <= 0)
    return `<span class="status-badge status-today">Departing Today</span>`;
  if (remaining === 1)
    return `<span class="status-badge status-tomorrow">Tomorrow</span>`;
  return `<span class="status-badge status-staying">${remaining} nights left</span>`;
}

function renderGuests(guests) {
  // Summary chips
  const total      = guests.length;
  const departing  = guests.filter(g => g.remaining === 0).length;
  const tomorrow   = guests.filter(g => g.remaining === 1).length;

  document.getElementById('guest-count-badge').textContent =
    total ? `(${total})` : '';

  document.getElementById('guest-summary').innerHTML = `
    <div class="guest-chip"><span>🛏️</span> ${total} In-House</div>
    ${departing ? `<div class="guest-chip"><span>🚪</span> ${departing} Departing Today</div>` : ''}
    ${tomorrow  ? `<div class="guest-chip"><span>📦</span> ${tomorrow} Leaving Tomorrow</div>` : ''}
  `;

  if (!guests.length) {
    document.getElementById('guest-body').innerHTML =
      `<tr><td colspan="7"><div class="no-guests">
        <div class="no-icon">🏨</div>No guests currently in-house
       </div></td></tr>`;
    return;
  }

  let rows = '';
  for (const g of guests) {
    rows += `<tr>
      <td><strong>${g.room}</strong></td>
      <td>${g.name || '<em style="color:#aaa">—</em>'}</td>
      <td>${planBadge(g.plan)}</td>
      <td class="right">${g.arrival  || '—'}</td>
      <td class="right">${g.departure || '—'}</td>
      <td class="right">${g.total_nights !== null ? g.total_nights + ' N' : '—'}</td>
      <td class="right">${statusBadge(g.remaining)}</td>
    </tr>`;
  }
  document.getElementById('guest-body').innerHTML = rows;
  document.getElementById('guest-updated').textContent =
    `${total} guests in-house · Last updated: ${new Date().toLocaleTimeString()}`;
}

// ── Auto-refresh ───────────────────────────────────────
loadData();
setInterval(() => { if (!currentDate) loadData(); }, 300000);
</script>
