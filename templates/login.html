<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Himalayan Suite — Login</title>
  <style>
    :root {
      --primary: #1a3c5e;
      --accent:  #e8a020;
      --red:     #e74c3c;
      --bg:      #f0f4f8;
      --card:    #ffffff;
      --text:    #2c3e50;
      --muted:   #7f8c8d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: .4px;
    }
    .login-logo h1 span { color: var(--accent); }
    .login-logo p {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #dde3ec;
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      background: #f8fafc;
      transition: border-color .2s;
      outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--primary);
      background: #fff;
    }
    .error-msg {
      background: #fdf0ee;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--red);
      font-size: .85rem;
      margin-bottom: 18px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), #2c5f8a);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: 4px;
    }
    button[type="submit"]:hover { opacity: .9; }
    .footer {
      margin-top: 24px;
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <h1>🏨 <span>Himalayan Suite</span></h1>
      <p>Dashboard — Sign In</p>
    </div>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button type="submit">Sign In</button>
    </form>
  </div>
  <div class="footer">Himalayan Suite Hotel &nbsp;·&nbsp; Internal Dashboard</div>
</body>
</html>
